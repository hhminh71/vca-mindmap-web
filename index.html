<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCA Dynamic Visualizer - CTIA</title>
<style>
    /* CẤU HÌNH GIAO DIỆN VCA */
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; display: flex; flex-direction: column;}
    .vca-header { background: #0056b3; color: white; padding: 12px 20px; border-bottom: 4px solid #d4af37; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-shrink: 0; }
    .vca-top { font-size: 11px; text-transform: uppercase; opacity: 0.8; letter-spacing: 0.5px; }
    .vca-title { font-size: 13px; font-weight: 700; text-transform: uppercase; margin-top: 2px; }
    .vca-badge { font-size: 12px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 5px;}
    .main-area { flex-grow: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;}
    .vca-footer { background: #e9ecef; color: #555; text-align: center; padding: 5px; font-size: 11px; flex-shrink: 0; border-top: 1px solid #ddd; }

    /* Nút Tải ảnh HD */
    .download-btn {
        position: absolute;
        bottom: 30px;
        right: 30px;
        background: #d4af37; /* Vàng Gold VCA */
        color: #0056b3; /* Xanh VCA */
        border: 2px solid #0056b3;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-family: 'Segoe UI', Arial, sans-serif;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        z-index: 1000;
        transition: all 0.3s ease;
    }
    .download-btn:hover {
        background: #0056b3;
        color: white;
        border-color: #d4af37;
    }
    
    /* Vùng chứa Mindmap */
    #markmap { width: 100%; height: 100%; }
    
    /* Loading Spinner */
    #loading { position: absolute; font-size: 14px; color: #0056b3; font-weight: bold; }
</style>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="vca-header">
        <div class="vca-top">Tổng công ty Cảng hàng không Việt Nam - CTCP</div>
        <div class="vca-title">Cảng hàng không quốc tế Cần Thơ</div>
        <div class="vca-badge">Phòng Tài chính - Kế hoạch | Sơ đồ Tổ chức Live</div>
    </div>

    <div class="main-area">
        <div id="loading">AI-VCA.COM</div>
        <button class="download-btn" onclick="downloadHighResImage()">📥 TẢI ẢNH HD</button>
        <svg id="markmap"></svg>
    </div>

    <div class="vca-footer">Hệ thống hỗ trợ triển khai văn bản nội bộ - VCA</div>

    <script>
        async function loadDynamicMindmap() {
            // ĐÃ THAY BẰNG LINK WORKER CỦA BẠN
            const WORKER_URL = "https://vca-mindmap-api.hhminh71.workers.dev";
            
            try {
                const response = await fetch(WORKER_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                const markdownData = await response.text();

                // Ẩn chữ loading
                document.getElementById('loading').style.display = 'none';

                // Khởi tạo Markmap
                const { Transformer } = window.markmap;
                const transformer = new Transformer();
                const { root } = transformer.transform(markdownData);
                
                window.markmap.Markmap.create('#markmap', {
                    autoFit: true,
                    color: (node) => node.depth === 1 ? '#0056b3' : (node.depth === 2 ? '#008080' : '#d4af37')
                }, root);

            } catch (error) {
                document.getElementById('loading').innerText = "Lỗi tải dữ liệu. Vui lòng kiểm tra lại cấu hình.";
                console.error("Error fetching mindmap data:", error);
            }
        }

        window.onload = loadDynamicMindmap;

        // Hàm xuất ảnh độ phân giải cao bằng html2canvas
        function downloadHighResImage() {
            const btn = document.querySelector('.download-btn');
            const originalText = btn.innerText;
            btn.innerText = "⏳ Đang xử lý...";
            btn.style.pointerEvents = "none";
            
            // Tạm ẩn nút bấm đi để ảnh xuất ra không bị dính hình nút tải
            btn.style.visibility = 'hidden';

            // Chụp toàn bộ khu vực hiển thị (bao gồm cả background)
            const captureArea = document.querySelector('.main-area');

            html2canvas(captureArea, {
                scale: 3, // Nhân 3 chất lượng (Nét căng)
                useCORS: true, // Xử lý lỗi bảo mật Cross-Origin của trình duyệt
                backgroundColor: '#f5f7fa',
                logging: false
            }).then(function(canvas) {
                // Hiện lại nút bấm sau khi chụp xong
                btn.style.visibility = 'visible';
                btn.innerText = originalText;
                btn.style.pointerEvents = "auto";

                // Tự động tải ảnh về
                const link = document.createElement('a');
                link.download = 'SoDoToChuc_CTIA_HD.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(function(error) {
                console.error('Lỗi xuất ảnh:', error);
                alert("Đã xảy ra lỗi khi tạo ảnh! Bạn vui lòng thử lại nhé.");
                btn.style.visibility = 'visible';
                btn.innerText = originalText;
                btn.style.pointerEvents = "auto";
            });
        }
    </script>
    

</body>
</html>
