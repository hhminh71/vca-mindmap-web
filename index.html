<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCA Dynamic Visualizer - CTIA</title>
<style>
    /* CẤU HÌNH GIAO DIỆN VCA */
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; display: flex; flex-direction: column;}
    .vca-header { background: #0056b3; color: white; padding: 12px 20px; border-bottom: 4px solid #d4af37; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-shrink: 0; }
    .vca-top { font-size: 11px; text-transform: uppercase; opacity: 0.8; letter-spacing: 0.5px; }
    .vca-title { font-size: 13px; font-weight: 700; text-transform: uppercase; margin-top: 2px; }
    .vca-badge { font-size: 12px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 5px;}
    .main-area { flex-grow: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;}
    .vca-footer { background: #e9ecef; color: #555; text-align: center; padding: 5px; font-size: 11px; flex-shrink: 0; border-top: 1px solid #ddd; }
    
    /* Vùng chứa Mindmap */
    #markmap { width: 100%; height: 100%; }
    
    /* Loading Spinner */
    #loading { position: absolute; font-size: 14px; color: #0056b3; font-weight: bold; }
</style>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.15.4"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.15.4"></script>
</head>
<body>

    <div class="vca-header">
        <div class="vca-top">Tổng công ty Cảng hàng không Việt Nam - CTCP</div>
        <div class="vca-title">Cảng hàng không quốc tế Cần Thơ</div>
        <div class="vca-badge">Phòng Tài chính - Kế hoạch | Sơ đồ Tổ chức Live</div>
    </div>

    <div class="main-area">
        <div id="loading">Đang tải dữ liệu từ Google Sheets...</div>
        <svg id="markmap"></svg>
    </div>

    <div class="vca-footer">Hệ thống hỗ trợ triển khai văn bản nội bộ - VCA</div>

    <script>
        async function loadDynamicMindmap() {
            // ĐÃ THAY BẰNG LINK WORKER CỦA BẠN
            const WORKER_URL = "https://vca-mindmap-api.hhminh71.workers.dev";
            
            try {
                const response = await fetch(WORKER_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                const markdownData = await response.text();

                // Ẩn chữ loading
                document.getElementById('loading').style.display = 'none';

                // Khởi tạo Markmap
                const { Transformer } = window.markmap;
                const transformer = new Transformer();
                const { root } = transformer.transform(markdownData);
                
                window.markmap.Markmap.create('#markmap', {
                    autoFit: true,
                    color: (node) => node.depth === 1 ? '#0056b3' : (node.depth === 2 ? '#008080' : '#d4af37')
                }, root);

            } catch (error) {
                document.getElementById('loading').innerText = "Lỗi tải dữ liệu. Vui lòng kiểm tra lại cấu hình.";
                console.error("Error fetching mindmap data:", error);
            }
        }

        window.onload = loadDynamicMindmap;
    </script>

</body>
</html>
